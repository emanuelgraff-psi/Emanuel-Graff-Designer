<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emanuel Graff — Portfolio</title>
    <meta
      name="description"
      content="Graphic designer portfolio focused on branding, presentations, and intuitive digital products."
    />
    <style>
      :root {
        --pad
        --bg-page: #050505;
        --bg-surface: #f3f3f1;
        --panel: #e9e9e7;
        --panel-soft: #f2f2f1;
        --text: #242424;
        --muted: #5c5c5c;
        --accent: #c7e62e;
        --accent-soft: rgba(199, 230, 46, 0.26);
        --border-soft: rgba(0, 0, 0, 0.04);
        --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.05);
        --shadow-chip: 0 6px 14px rgba(0, 0, 0, 0.08);
        --radius-shell: 18px;
        --radius-xl: 36px;
        --radius-lg: 30px;
        --radius-md: 22px;
        --radius-pill: 999px;
        
        --ease: 260ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        background: var(--bg-page);
        color: var(--text);
        font-family: "pacaembu", sans-serif;
        font-weight: 400;
        font-style: normal;
        padding: 16px 48px 16px 48px;
        gap:16px;

      }

      img {
        max-width: 100%;
        display: block;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      .shell {
        position: relative;
        min-height: calc(100vh - 16px);
        background: var(--bg-surface);
        border-radius: var(--radius-shell) var(--radius-shell) 0 0;
        overflow: clip;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      

      .container {
        width: min(calc(100% - 88px), var(--container));
        margin: 0 auto;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 24px;
        padding: 16px 16px 16px 24px;
      }

      .brand {
        font-family: "Benton Modern D";
        font-size: 20px;
        font-style: italic;
        font-weight: 600;
        line-height: 0px;
      }

      .nav {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }

      .nav-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0;
        min-height: 40px;
        padding: 0 17px;
        border-radius: var(--radius-pill);
        background: var(--gray-green, #F3F5F4);
        border: 0;
        color: var(--text);
        white-space: nowrap;
        transition: background var(--ease), padding var(--ease), box-shadow var(--ease),
          transform var(--ease), gap var(--ease);
        box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.02);
      }

      .nav-pill .label {
        line-height: 1;
        color: #212121;
        leading-trim: both;
        text-edge: cap;
        font-family: Pacaembu;
        font-size: 14px;
        font-style: normal;
        font-weight: 300;
        line-height: normal;
      }

      .nav-pill .icon-wrap {
        width: 0;
        opacity: 0;
        overflow: hidden;
        transform: translateX(-4px);
        transition: width var(--ease), opacity var(--ease), transform var(--ease);
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .nav-pill .icon-wrap svg {
        width: 14px;
        height: 14px;
      }

      .nav-pill:hover,
      .nav-pill:focus-visible,
      .nav-pill.is-active {
        background: var(--green-bright, #C0E62C);
        padding-right: 14px;
        padding-left: 18px;
        gap: 8px;
        transform: translateY(-1px);
        border-radius: 26px;
        
       


      }

      .nav-pill:hover .icon-wrap,
      .nav-pill:focus-visible .icon-wrap,
      .nav-pill.is-active .icon-wrap {
        width: 14px;
        opacity: 1;
        transform: translateX(0);border-radius: 26px;
        background: var(--green-bright, #C0E62C);


      }

      .hero {
        background: var(--panel);
        border-radius: var(--radius-xl);
        min-height: 314px;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 52px 38px 36px;
        box-shadow: inset 0 0 0 1px var(--border-soft);
      }

      .hero-inner {
        max-width: 920px;
      }

      .hero-title {
        color: #212121;
        text-align: center;
        leading-trim: both;
        text-edge: cap;
        font-family: Pacaembu;
        font-size: 34px;
        font-style: normal;
        font-weight: 300;
        line-height: 43px; /* 126.471% */   

        
      }

      .hero-meta {
        margin-top: 42px;
        display: flex;
        justify-content: center;
        gap: 40px;
        flex-wrap: wrap;
        font-size: 0.98rem;
      }

      .meta-item {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        color: var(--dark-gray, #212121);
        text-align: center;
        leading-trim: both;
        text-edge: cap;
        font-family: Pacaembu;
        font-size: 12px;
        font-style: normal;
        font-weight: 400;
        line-height: 43px;
      }

      .meta-item svg {
        width: 16px;
        height: 16px;
        fill: currentColor;
        flex: 0 0 auto;
      }

      .projects {
        padding: 14px 0 42px;
      }

      .project-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 18px;
      }

      .project-card {
        position: relative;
        isolation: isolate;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 316px;
        border-radius: 42px;
        background: var(--panel);
        padding: 12px 12px 12px 12px;
        box-shadow: inset 0 0 0 1px var(--border-soft);
        transition: transform var(--ease), box-shadow var(--ease);
        background: var(--gray-green, #F3F5F4);

      }

      .project-card::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 42px;
        background: var(--gradiente-1, linear-gradient(180deg, #C0E62C 0%, #F3F5F4 100%));
        opacity: 0;
        transition: opacity var(--ease);
        pointer-events: none;
        z-index: 0;
      }

      .project-card:hover,
      .project-card:focus-within {
        transform: translateY(-2px);
      }

      .project-card.is-highlighted::before,
      .project-card:hover::before,
      .project-card:focus-within::before {
        opacity: 1;
      }

      .project-card.is-highlighted {
        box-shadow: inset 0 0 0 1px rgba(181, 211, 34, 0.35);
      }

      .project-frame {
        position: relative;
        
        align-self: stretch;
        z-index: 1;
        height: 252px;
        border-radius: 28px;
        background: var(--panel-soft);
        overflow: hidden;
        box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.025);
      }

      .project-thumb {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .project-chip {
        color: #000;

        text-align: center;
        leading-trim: both;
        text-edge: cap;
        font-weight: 300;
        line-height: 0px;

        font-family: "pacaembu", sans-serif;
        font-weight: 300;
        font-style: normal;
        font-size: 12px;
        position: absolute;
        left: 50%;
        bottom: 10px;
        z-index: 2;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 6px;
        min-height: 31px;
        padding: 6px 12px 6px 6px;
        border-radius: var(--radius-pill);
        background: rgba(255, 255, 255, 0.94);
        box-shadow: var(--shadow-chip);
        white-space: nowrap;
        transition: transform 1500ms cubic-bezier(0.1, 1, 0.36, 1), box-shadow 0.28s ease, padding-right 0.48s cubic-bezier(0.3, -3, 0.2, 2.5);
      
        
    }

      .project-chip::before {
        content: "";
        width: 18px;
        height: 18px;
        border-radius: 999px;
        background: #d9d9d9;
        flex: 0 0 auto;
      }

      .project-chip .icon-wrap {
        width: 0;
        opacity: 0;
        overflow: hidden;
        transform: translateX(-4px);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: width var(--ease), opacity var(--ease), transform var(--ease);
      }

      .project-chip .icon-wrap svg {
        width: 18px;
        height: 18px;
      }

      .project-card:hover .project-chip,
      .project-card:focus-within .project-chip,
      .project-card.is-highlighted .project-chip {
        padding-right: 10px;
        gap: 8px;
        transform: translateX(-50%) translateY(-1px);
      }

      .project-card:hover .project-chip .icon-wrap,
      .project-card:focus-within .project-chip .icon-wrap,
      .project-card.is-highlighted .project-chip .icon-wrap {
        width: 18px;
        opacity: 1;
        transform: translateX(0);
      }

      .project-link {
        position: absolute;
        inset: 0;
        z-index: 3;
        border-radius: inherit;
      }

      .project-link:focus-visible,
      .nav-pill:focus-visible {
        outline: 2px solid rgba(0, 0, 0, 0.7);
        outline-offset: 2px;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      @media (max-width: 980px) {
        .container {
          width: min(calc(100% - 44px), var(--container));
        }

        .header {
          padding: 16px 0px 16px 24px;
        }

        .hero {
          padding: 44px 28px 32px;
          min-height: 286px;
        }

        .project-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 640px) {
        body {
          padding: 0;
          background: var(--bg-surface);
        }

        .shell {
          min-height: 100vh;
          border-radius: 0;
        }

        .notch {
          display: none;
        }

        .container {
          width: min(calc(100% - 24px), var(--container));
        }

        .header {
          flex-direction: column;
          align-items: flex-start;
          gap: 16px;
          padding: 16px 16px 16px 16px;
          
        }

        .nav {
          width: 100%;
        }

        .nav-pill {
          flex: 1 1 calc(33.333% - 7px);
          min-width: 0;
        }

        .hero {
          min-height: 244px;
          padding: 34px 20px 28px;
          border-radius: 28px;
        }

        .hero-meta {
          margin-top: 28px;
          gap: 18px 26px;
        }

        .projects {
          padding-top: 12px;
        }

        .project-grid {
          grid-template-columns: 1fr;
        }

        .project-card {
          min-height: 292px;
        }

        .project-frame {
          height: 224px;
          border-radius: 24px;
        }
      }
    </style>
  </head>
  <body>
      <header class="container header">
        <a class="brand" href="#home">Emanuel Graff</a>

        <nav class="nav" aria-label="Primary navigation">
          <a class="nav-pill is-active" href="mailto:emanuelgraff1@gmail.com">
            <span class="label">Email me</span>
            <span class="icon-wrap" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M7 17 17 7" />
                <path d="M8 7h9v9" />
              </svg>
            </span>
          </a>
          <a class="nav-pill" href="https://linkedin.com/in/emanuelgraff/" target="_blank" rel="noreferrer">
            <span class="label">Linkedin</span>
            <span class="icon-wrap" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M7 17 17 7" />
                <path d="M8 7h9v9" />
              </svg>
            </span>
          </a>
          <a class="nav-pill" href="https://behance.net/emanuelgraffdot" target="_blank" rel="noreferrer">
            <span class="label">Behance</span>
            <span class="icon-wrap" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M7 17 17 7" />

              </svg>
            </span>
          </a>
        </nav>
      </header>

      <main class="container" id="home">
        <section class="hero" aria-labelledby="hero-title">
          <div class="hero-inner">

              Um designer gráfico tornando branding e apresentações em produtos intuitivos e persuasivos.
            </h1>

            <div class="hero-meta" aria-label="Location and role">
              <span class="meta-item">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 2C8.14 2 5 5.14 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.86-3.14-7-7-7Zm0 9.5A2.5 2.5 0 1 1 12 6.5a2.5 2.5 0 0 1 0 5Z" />
                </svg>
                Brazil
              </span>
              <span class="meta-item">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M10 4h4v3h5a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h5V4Zm2 0v3h0V4ZM5 11v6h14v-6H5Z" />
                </svg>
                Freelancer
              </span>
            </div>
          </div>
        </section>

        <section class="projects" aria-labelledby="projects-title">
          <h2 class="sr-only" id="projects-title">Featured projects</h2>

          <div class="project-grid">
            <article class="project-card is-highlighted">
              <div class="project-frame">
                <img
                  class="project-thumb"
                  src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=1200&q=80"

              <div class="project-chip" aria-hidden="true">
                <span>Projeto 1</span>
                <span class="icon-wrap">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

              </div>
              <a class="project-link" href="#" aria-label="Open Projeto 1"></a>

            <article class="project-card">
              <div class="project-frame">
                <img
                  class="project-thumb"
                  src="https://images.unsplash.com/photo-1496171367470-9ed9a91ea931?auto=format&fit=crop&w=1200&q=80"
                  alt="Project preview placeholder"
                />
              </div>
              <div class="project-chip" aria-hidden="true">
                <span>Projeto 2</span>
                <span class="icon-wrap">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M7 17 17 7" />

                </span>

            <article class="project-card">
              <div class="project-frame">
                <img
                  class="project-thumb"
                  src="https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?auto=format&fit=crop&w=1200&q=80"
                  alt="Project preview placeholder"
                />
              </div>
              <div class="project-chip" aria-hidden="true">
                <span>Projeto 3</span>
                <span class="icon-wrap">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M7 17 17 7" />
                    <path d="M8 7h9v9" />
                  </svg>
                </span>
              </div>
              <a class="project-link" href="#" aria-label="Open Projeto 3"></a>
            </article>
          </div>
        </section>
      </main>
   

    <script>
      const navPills = Array.from(document.querySelectorAll('.nav-pill'));
      const nav = document.querySelector('.nav');
      const cards = Array.from(document.querySelectorAll('.project-card'));
      const cardsWrap = document.querySelector('.project-grid');

      const setActiveNav = (item) => {
        navPills.forEach((pill) => pill.classList.toggle('is-active', pill === item));
      };

      navPills.forEach((pill, index) => {
        pill.addEventListener('mouseenter', () => setActiveNav(pill));
        pill.addEventListener('focus', () => setActiveNav(pill));
        if (index === 0) pill.classList.add('is-active');
      });

      nav?.addEventListener('mouseleave', () => {
        navPills.forEach((pill, index) => pill.classList.toggle('is-active', index === 0));
      });

      const setActiveCard = (activeCard) => {
        cards.forEach((card) => card.classList.toggle('is-highlighted', card === activeCard));
      };

      cards.forEach((card, index) => {
        card.addEventListener('mouseenter', () => setActiveCard(card));
        card.addEventListener('focusin', () => setActiveCard(card));
        if (index === 0) card.classList.add('is-highlighted');
      });

      cardsWrap?.addEventListener('mouseleave', () => {
        cards.forEach((card, index) => card.classList.toggle('is-highlighted', index === 0));
      });
    </script>
  </body>
</html>
